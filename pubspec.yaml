name: movies_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_screenutil: ^5.9.3
  auto_route: ^11.1.0
  auto_route_generator: ^10.5.0
  shared_preferences: ^2.5.4

dev_dependencies:

  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.4"
flutter:

  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/launchericon.png"
  min_sdk_android: 21 # a
